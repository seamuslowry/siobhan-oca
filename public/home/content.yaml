summary:
  - Professor Siobhan Oca’s work focuses on applied robotics, particularly medical robotics and the development of safe, effective autonomous medical procedures. Drawing on her interdisciplinary background in engineering, translational medicine, and industry, she develops robotics curricula that integrate technical design with ethics, regulation, and entrepreneurship while studying how students build self-efficacy in robotics. Her research explores how to design and evaluate autonomous systems that are trustworthy in practice, preparing undergraduate and graduate students to responsibly develop robotics technologies that positively impact society.
