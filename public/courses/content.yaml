  - name: Introduction to Medical Robotics and Surgical Technologies
    syllabus: medical-robotics.pdf
    summary:
      - This course is a broad introduction to medical robotics and surgical technologies. This course covers technical instruction in core areas of surgical technology and requires the completion of 3 mini-projects where trainees address real-world problems in surgery. It is designed to provide trainees with the required academic foundation to navigate the field of surgical technology and transition to more in-depth impactful, research during their second year. 
    projects:
      - name: Stroke Simmulator Prototype
        description:
          - Students developed a manikin head to simulate realistic eyeball and eyelid movements associated with stroke. These motions (dysconjugate gaze, nystagmus, eyelid tremor, droop) are preprogrammed and can also be controlled manually through dual joysticks. Joystick control allows users to interact with the manikin within the constraints of the user selected stroke setting.
